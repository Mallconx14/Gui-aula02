<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aulacss</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="flex">
        <div class="display">
            <h1>Soma</h1>
            <input type="text" id="1" placeholder="Digite um número aqui">
            <input type="text" id="2" placeholder="Digite outro número aqui">
            <button onclick="somar()">Somar</button>
            <h2 id="resultado"></h2>
        </div>

        <div class="display-blue">
            <h1>Subtração</h1>
            <input type="text" id="3" placeholder="Digite um número aqui">
            <input type="text" id="4" placeholder="Digite outro número aqui">
            <button onclick="subtrair()">Subtrair</button>
            <h2 id="resultado1"></h2>
        </div>

        <div class="display">
            <h1>Multiplicação</h1>
            <input type="text" id="5" placeholder="Digite um número aqui">
            <input type="text" id="6" placeholder="Digite outro número aqui">
            <button onclick="multiplicar()">Multiplicar</button>
            <h2 id="resultado2"></h2>
        </div>
    </div>

    <div class="row">
        <h1>Área do triângulo</h1>
            <input type="text" id="7" placeholder="Digite um número aqui">
            <input type="text" id="8" placeholder="Digite outro número aqui">
            <button onclick="triangulo()">Calcular</button>
            <h2 id="resultado3"></h2>
    </div>

    <div class="row">
        <h1>Área do quadrado</h1>
            <input type="text" id="9" placeholder="Digite um número aqui">
            <button onclick="quadrado()">Calcular</button>
            <h2 id="resultado4"></h2>
    </div>

    <div class="row">
        <h1>Área do retângulo</h1>
            <input type="text" id="10" placeholder="Digite um número aqui">
            <input type="text" id="11" placeholder="Digite outro número aqui">
            <button onclick="retangulo()">Calcular</button>
            <h2 id="resultado5"></h2>
    </div>

    <div class="row">
        <h1>Área do trapézio</h1>
            <input type="text" id="12" placeholder="Digite um número aqui">
            <input type="text" id="13" placeholder="Digite outro número aqui">
            <input type="text" id="14" placeholder="Digite outro número aqui">
            <button onclick="trapezio()">Calcular</button>
            <h2 id="resultado6"></h2>
    </div>

    <div class="row">
        <h1>Área do losango</h1>
            <input type="text" id="15" placeholder="Digite um número aqui">
            <input type="text" id="16" placeholder="Digite outro número aqui">
            <button onclick="losango()">Calcular</button>
            <h2 id="resultado7"></h2>
    </div>

    <div class="row">
        <h1>Área do círculo</h1>
            <input type="text" id="17" placeholder="Digite um número aqui">
            <button onclick="circulo()">Calcular</button>
            <h2 id="resultado8"></h2>
    </div>

    <div class="row">
        <h1>Área da coroa circular</h1>
            <input type="text" id="18" placeholder="Digite um número aqui">
            <input type="text" id="19" placeholder="Digite outro número aqui">
            <button onclick="coroa()">Calcular</button>
            <h2 id="resultado9"></h2>
    </div>
</body>
<script src="./script.js"></script>

</html>
